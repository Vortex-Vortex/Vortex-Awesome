#################################
#     Background-Blurring       #
#################################
rules = (
    {
        opacity = 0.9;
        blur-background = false;
        animations = (
            {
                triggers = [ "geometry" ];
                preset = "geometry-change";
            }
        )
    },
    {
        match = "focused || group_focused || class_g = 'awesome' || class_g = 'Rofi'";
        opacity = 1;
    },
    {
        match = "class_g = 'Terminator' || class_g = 'Alacritty'";
        blur-background = true;
    },
    {
        match = "class_g = 'Alacritty'";
        animations = (
            {
                triggers = [ "open", "show" ];
                preset = "appear";
                duration = 0.1;
            },
            {
                triggers = [ "close", "hide" ];
                preset = "disappear";
                duration = 0.1;
            }
        )
    },
    {
        match = "class_g = 'Rofi'";
        animations = (
            {
                triggers = [ "open", "show" ];
                preset = "slide-in";
                direction = "left";
            },
            {
                triggers = [ "close", "hide" ];
                preset = "slide-out";
                direction = "left";
            }
        );
    },
    {
        match = "class_g = 'Rofi' && (name *= 'Emoji' || name *= 'Calculate' || name *= 'Internet')";
        animations = (
            {
                triggers = [ "open", "show" ];
                preset = "appear";
                duration = 0.1;
            },
            {
                triggers = [ "close", "hide" ];
                preset = "disappear";
                duration = 0.1;
            }
        )
    },
    {
        match = "class_g = 'awesome' || class_g = 'flameshot'";
        animations = ({
            triggers = [ "open", "show", "close", "hide", "geometry" ];
            suppressions = [ "open", "show", "close", "hide", "geometry" ];
        });
    },
    {
        match = "class_g = 'awesome'";
        animations = (
            {
                triggers = [ "open", "show" ];
                suppressions = [ "open", "close" ];
                preset = "appear";
                duration = 0.1
            },
            {
                triggers = [ "close", "hide" ];
                suppressions = [ "close", "open" ];
                preset = "disappear";
                duration = 0.1
            }
        );
    },
    {
        match = "class_g = 'awesome' && x = 0 && y = 0";
        animations = (
            {
                triggers = [ "open", "show" ];
                preset = "slide-in";
                direction = "left";
            },
            {
                triggers = [ "close", "hide" ];
                preset = "slide-out";
                direction = "left";
            },
        )
    }
)

blur:
{
  method = "dual_kawase";
  strength = 3;
}

backend = "egl";
use-ewmh-active-win = true;
unredir-if-possible = true;
unredir-if-possible-delay = 1000;
detect-transient = true;
use-damage = true;

